<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Info-Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a2e; /* Dunkles Design */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #16213e;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 500px;
            width: 100%;
            margin-bottom: 20px;
            border: 1px solid #0f3460;
        }
        h1 { color: #4ecca3; margin-bottom: 5px; }
        .weather-img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 15px;
        }
        .btn {
            background: #4ecca3;
            color: #1a1a2e;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
        }
        .btn:hover { background: #45b291; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Dashboard</h1>
        <p>Willkommen auf deiner persönlichen Informations-Seite.</p>
    </div>

    <div class="card">
        <h3>Aktuelles Wetter</h3>
        <img class="weather-img" src="https://wttr.in/Berlin_3_white.png" alt="Wetter Daten">
        <p><small>Daten von wttr.in</small></p>
    </div>

    <div class="card">
        <h3>Heizungs-Steuerung (Vorschau)</h3>
        <p>Status: <span style="color: #4ecca3;">Verbunden</span></p>
        <p>Temperatur Wohnzimmer: <strong>21.5°C</strong></p>
        <a href="#" class="btn">App öffnen</a>
    </div>

</body>
</html>
