<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mein Dashboard</title>

<style>

body{
font-family:Arial;
background:#1a1a2e;
color:white;
margin:0;
padding:20px;
}

h2{
color:#4ecca3;
}

.card{
background:#16213e;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
background:#4ecca3;
border:none;
padding:8px 14px;
cursor:pointer;
border-radius:5px;
}

input,select{
padding:8px;
border-radius:5px;
border:none;
}

ul{
list-style:none;
padding:0;
}

li{
background:#0f3460;
padding:10px;
margin-bottom:8px;
border-radius:5px;
display:flex;
justify-content:space-between;
align-items:center;
}

.delete-btn{
background:#e94560;
color:white;
border:none;
padding:5px 10px;
cursor:pointer;
}

.progress{
height:8px;
background:#333;
border-radius:4px;
margin-top:5px;
}

.progress-bar{
height:8px;
background:#4ecca3;
border-radius:4px;
}

#login{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#1a1a2e;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

</style>

</head>

<body>

<div id="login">

<h2>PIN eingeben</h2>

<input type="password" id="pin" placeholder="PIN">

<button onclick="login()">Login</button>

<p id="error" style="color:red;display:none;">Falscher PIN</p>

</div>


<div id="dashboard" style="display:none;max-width:900px;margin:auto;">


<div class="card">

<div id="time" style="font-size:40px;"></div>

<div id="date"></div>

</div>



<div class="card">

<h2>📝 To-Dos</h2>

<input id="todo-input" placeholder="Aufgabe">

<button onclick="addTodo()">+</button>

<ul id="todo-list"></ul>

</div>



<div class="card">

<h2>🎯 Ziele</h2>

<div style="display:flex;gap:5px;margin-bottom:10px;">

<input id="goal-input" placeholder="Ziel">

<select id="goal-priority">

<option value="normal">Normal</option>
<option value="important">🔥 Wichtig</option>
<option value="critical">🚨 Sehr wichtig</option>

</select>

<button onclick="addGoal()">+</button>

</div>

<ul id="goal-list"></ul>

</div>



<div class="card">

<h2>🔗 Links</h2>

<input id="link-name" placeholder="Name">

<input id="link-url" placeholder="URL">

<button onclick="addLink()">+</button>

<ul id="link-list"></ul>

</div>


</div>


<script>

const PIN="123456";

function login(){

const input=document.getElementById("pin").value;

if(input===PIN){

document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="block";

loadTodos();
loadGoals();
loadLinks();

}else{

document.getElementById("error").style.display="block";

}

}



function updateClock(){

const now=new Date();

document.getElementById("time").innerText=now.toLocaleTimeString("de-DE");

document.getElementById("date").innerText=now.toLocaleDateString("de-DE");

}

setInterval(updateClock,1000);



/* TODOS */

let todos=[];

function addTodo(){

const text=document.getElementById("todo-input").value;

if(!text)return;

todos.push(text);

document.getElementById("todo-input").value="";

saveTodos();

}

function deleteTodo(i){

todos.splice(i,1);

saveTodos();

}

function saveTodos(){

localStorage.setItem("todos",JSON.stringify(todos));

loadTodos();

}

function loadTodos(){

const saved=localStorage.getItem("todos");

if(saved)todos=JSON.parse(saved);

const list=document.getElementById("todo-list");

list.innerHTML="";

todos.forEach((t,i)=>{

list.innerHTML+=`<li>${t} <button class="delete-btn" onclick="deleteTodo(${i})">X</button></li>`;

});

}



/* GOALS */

let goals=[];

function addGoal(){

const text=document.getElementById("goal-input").value;
const prio=document.getElementById("goal-priority").value;

if(!text)return;

goals.push({text,prio,progress:0});

document.getElementById("goal-input").value="";

saveGoals();

}

function progressGoal(i){

goals[i].progress+=10;

if(goals[i].progress>100)goals[i].progress=100;

saveGoals();

}

function deleteGoal(i){

goals.splice(i,1);

saveGoals();

}

function saveGoals(){

localStorage.setItem("goals",JSON.stringify(goals));

loadGoals();

}

function loadGoals(){

const saved=localStorage.getItem("goals");

if(saved)goals=JSON.parse(saved);

const list=document.getElementById("goal-list");

list.innerHTML="";

goals.forEach((g,i)=>{

let color="#0f3460";

if(g.prio==="important")color="#e67e22";
if(g.prio==="critical")color="#e94560";

list.innerHTML+=`

<li style="flex-direction:column;background:${color}">

<div style="display:flex;justify-content:space-between;width:100%;">

<strong>${g.text}</strong>

<button class="delete-btn" onclick="deleteGoal(${i})">X</button>

</div>

<div class="progress">

<div class="progress-bar" style="width:${g.progress}%"></div>

</div>

<small>${g.progress}%</small>

<button onclick="progressGoal(${i})">+10%</button>

</li>

`;

});

}



/* LINKS */

let links=[];

function addLink(){

const name=document.getElementById("link-name").value;
const url=document.getElementById("link-url").value;

if(!name||!url)return;

links.push({name,url});

document.getElementById("link-name").value="";
document.getElementById("link-url").value="";

saveLinks();

}

function deleteLink(i){

links.splice(i,1);

saveLinks();

}

function saveLinks(){

localStorage.setItem("links",JSON.stringify(links));

loadLinks();

}

function loadLinks(){

const saved=localStorage.getItem("links");

if(saved)links=JSON.parse(saved);

const list=document.getElementById("link-list");

list.innerHTML="";

links.forEach((l,i)=>{

list.innerHTML+=`

<li>

<a href="${l.url}" target="_blank" style="color:#4ecca3;">${l.name}</a>

<button class="delete-btn" onclick="deleteLink(${i})">X</button>

</li>

`;

});

}

</script>

</body>

</html>
