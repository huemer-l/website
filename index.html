<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine erste GitHub Website</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { color: #2ea44f; }
        p { font-size: 1.2rem; }
        .badge {
            display: inline-block;
            background: #2ea44f;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            text-decoration: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 Test bestanden!</h1>
        <p>Deine Website wird erfolgreich über <strong>GitHub Pages</strong> gehostet.</p>
        <p>Das war erst der Anfang. Jetzt kannst du anfangen zu coden!</p>
        <a href="https://github.com/huemer-1/website" class="badge">Zurück zum Repository</a>
    </div>

</body>
</html>
